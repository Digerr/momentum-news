<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f0f12"/>
      <stop offset="1" stop-color="#1a1a1f"/>
    </linearGradient>

    <!-- Red gradient for bolt -->
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dc2626"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>

    <!-- Subtle red halo behind bolt -->
    <radialGradient id="halo" cx="0.5" cy="0.45" r="0.4">
      <stop offset="0" stop-color="#dc2626" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#dc2626" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#dc2626" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filter for bolt -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feFlood flood-color="#000" flood-opacity="0.4"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background — dark gradient, rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Red halo behind bolt (subtle glow) -->
  <rect width="512" height="512" rx="112" fill="url(#halo)"/>

  <!-- Lightning bolt — centered, red with glow -->
  <g filter="url(#glow)" transform="translate(256, 256)">
    <path d="M 36 -156
             L -100 78
             L -12 78
             L -36 156
             L 100 -78
             L 12 -78
             Z"
          fill="url(#bolt)"
          filter="url(#shadow)"/>
  </g>

  <!-- Subtle top highlight for 3D feel -->
  <path d="M 112 0 L 400 0 Q 512 0 512 112 L 512 200 L 0 200 L 0 112 Q 0 0 112 0 Z"
        fill="#ffffff" opacity="0.04"/>
</svg>
